name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Rin Repository
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          VERSION=$(grep -E '^version = "[^"]+"' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Notify Build Start
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then exit 0; fi
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | sed 's/[<>&"]/\\&/g')

          RELEASE_TAG="${{ github.ref_name }}"
          if [ "$RELEASE_TAG" = "main" ]; then
            BUILD_LABEL="Manual Release Build"
            RELEASE_TAG="v${{ env.VERSION }}-${{ env.SHORT_SHA }}"
          else
            BUILD_LABEL="Auto Release Build"
          fi

          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="<b>Rin $BUILD_LABEL Started 🚀</b>
          Version: $RELEASE_TAG
          Branch: $GITHUB_REF_NAME

          <blockquote><code>$COMMIT_MSG</code></blockquote>

          <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"

          curl -s -X POST "https://botapi.arasea.dpdns.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="true" \
              --data-urlencode "text=$MESSAGE"

      - name: Checkout Keystore Repository
        uses: actions/checkout@v4
        with:
          repository: pavelc4/keystores
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: keystore-repo

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: rust-src

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Auto Create Tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG_NAME="v${{ env.VERSION }}"

          # Check if tag already exists to avoid errors
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists, skipping tag creation."
          else
            echo "Creating and pushing tag $TAG_NAME"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Build Native libraries
        id: build-native
        run: |
          set -o pipefail
          {
            cargo ndk -t aarch64-linux-android -o android/app/src/main/jniLibs build -p rin --release --features android
            cargo ndk -t aarch64-linux-android -o android/app/src/main/jniLibs build -p rpkg --release --features android
            cargo ndk -t aarch64-linux-android build -p rpkg --release --bin rpkg
            mkdir -p android/app/src/main/jniLibs/arm64-v8a
            cp target/aarch64-linux-android/release/rpkg android/app/src/main/jniLibs/arm64-v8a/librpkg_cli.so
          } 2>&1 | tee build-native.log

      - name: Build Release APK
        id: build-apk
        run: |
          set -o pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore-repo/rin-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEYALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} 2>&1 | tee ../build-gradle.log

      - name: Rename Artifact
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/Rin-v${{ env.VERSION }}-release-${{ env.SHORT_SHA }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rin-v${{ env.VERSION }}-release-${{ env.SHORT_SHA }}
          path: android/app/build/outputs/apk/release/Rin-v${{ env.VERSION }}-release-${{ env.SHORT_SHA }}.apk

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/Rin-v${{ env.VERSION }}-release-${{ env.SHORT_SHA }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on Success
        if: ${{ success() }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then exit 0; fi
          APK_PATH="android/app/build/outputs/apk/release/Rin-v${{ env.VERSION }}-release-${{ env.SHORT_SHA }}.apk"

          # Get commit message and escape special characters
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | sed 's/[<>&"]/\\&/g')

          RELEASE_TAG="${{ github.ref_name }}"
          if [ "$RELEASE_TAG" = "main" ]; then
            BUILD_LABEL="Manual Release Build"
            RELEASE_TAG="v${{ env.VERSION }}-${{ env.SHORT_SHA }}"
          else
            BUILD_LABEL="Auto Release Build"
          fi

          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          CAPTION="<b>✅ Rin $BUILD_LABEL Success</b>
          Version: $RELEASE_TAG
          Branch: $GITHUB_REF_NAME

          <blockquote><code>$COMMIT_MSG</code></blockquote>

          <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"

          # Send APK
          RESPONSE=$(curl -s -X POST "https://botapi.arasea.dpdns.org/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="$CHAT_ID" \
              -F document=@"$APK_PATH" \
              -F parse_mode="HTML" \
              -F disable_web_page_preview="true" \
              --form-string "caption=$CAPTION")

          # Extract message_id and pin the message
          MESSAGE_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
          
          if [ -n "$MESSAGE_ID" ]; then
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$BOT_TOKEN/pinChatMessage" \
                -d chat_id="$CHAT_ID" \
                -d message_id="$MESSAGE_ID" \
                -d disable_notification="true"
          fi

          # Create and send build log
          echo "=== RELEASE BUILD SUCCESS LOG ===" > build-success.log
          echo "Build Date: $(date)" >> build-success.log
          echo "Version: $RELEASE_TAG" >> build-success.log
          echo "Commit: ${{ github.sha }}" >> build-success.log
          echo "Branch: $GITHUB_REF_NAME" >> build-success.log
          echo "" >> build-success.log
          echo "=== Native Build Log (last 100 lines) ===" >> build-success.log
          tail -n 100 build-native.log >> build-success.log 2>/dev/null || echo "No native build log" >> build-success.log
          echo "" >> build-success.log
          echo "=== Gradle Build Log (last 100 lines) ===" >> build-success.log
          tail -n 100 build-gradle.log >> build-success.log 2>/dev/null || echo "No gradle build log" >> build-success.log

          curl -s -X POST "https://botapi.arasea.dpdns.org/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="$CHAT_ID" \
              -F document=@"build-success.log" \
              -F caption="📋 Release Build Success Log"

      - name: Notify Telegram on Failure
        if: ${{ failure() }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Get commit message and escape special characters
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | sed 's/[<>&"]/\\&/g')

          RELEASE_TAG="${{ github.ref_name }}"
          if [ "$RELEASE_TAG" = "main" ]; then
            BUILD_LABEL="Manual Release Build"
          else
            BUILD_LABEL="Auto Release Build"
          fi

          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="<b>❌ Rin $BUILD_LABEL Failed</b>
          Branch: $GITHUB_REF_NAME

          <blockquote><code>$COMMIT_MSG</code></blockquote>

          <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">View Logs</a>"

          curl -s -X POST "https://botapi.arasea.dpdns.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="true" \
              --data-urlencode "text=$MESSAGE"

          # Create and send error log
          echo "=== RELEASE BUILD FAILURE LOG ===" > build-error.log
          echo "Build Date: $(date)" >> build-error.log
          echo "Commit: ${{ github.sha }}" >> build-error.log
          echo "Branch: $GITHUB_REF_NAME" >> build-error.log
          echo "" >> build-error.log
          
          if [ -f build-native.log ]; then
            echo "=== Native Build Log (last 200 lines) ===" >> build-error.log
            tail -n 200 build-native.log >> build-error.log
            echo "" >> build-error.log
          fi
          
          if [ -f build-gradle.log ]; then
            echo "=== Gradle Build Log (last 200 lines) ===" >> build-error.log
            tail -n 200 build-gradle.log >> build-error.log
            echo "" >> build-error.log
          fi

          # Extract error messages
          echo "=== ERROR SUMMARY ===" >> build-error.log
          grep -i "error\|failed\|exception" build-native.log build-gradle.log 2>/dev/null | tail -n 50 >> build-error.log || echo "No specific errors found" >> build-error.log

          curl -s -X POST "https://botapi.arasea.dpdns.org/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="$CHAT_ID" \
              -F document=@"build-error.log" \
              -F caption="📋 Release Build Error Log"
